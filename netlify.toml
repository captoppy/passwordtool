# ============================================================
# JELLAR — netlify.toml
# ============================================================

[build]
  publish = "."

# ── REDIRECTS ──────────────────────────────────────────────
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# ── SECURITY HEADERS (applied to every page) ───────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Stop MIME sniffing
    X-Content-Type-Options = "nosniff"
    # XSS protection for older browsers
    X-XSS-Protection = "1; mode=block"
    # Referrer policy — don't leak URLs to third parties
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permissions — no camera/mic/geolocation access
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # HSTS — force HTTPS for 1 year
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # Content Security Policy — tight but functional
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://cesium.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cesium.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https: ; connect-src 'self' https://*.supabase.co https://ion.cesium.com https://assets.cesium.com https://www.google-analytics.com; frame-src 'none'; object-src 'none'; base-uri 'self';"

# ── RATE LIMITING ───────────────────────────────────────────
# Netlify rate limiting requires Netlify Pro or higher for [[edge_functions]]
# The JS-side rate limiting in JellarSecurity handles this for free tier.
# When you upgrade, add edge function rate limiting here.

# ── CACHE HEADERS for static assets ────────────────────────
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
