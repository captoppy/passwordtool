<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jellar — Top Testers</title>
<meta name="robots" content="noindex">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Space+Grotesk:wght@400;500;700&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
  .jellar-wordmark { font-family: "Cinzel", serif; font-weight: 900; letter-spacing: .12em; color: #ffffff; text-shadow: 0 0 8px rgba(255,255,255,.15); }
  :root {
    --bg: #05070a; --bg-2: #0a0e14; --line: #1a2028;
    --neon: #7cff50; --hot: #ff3864; --ice: #38d7ff; --gold: #ffd24a;
    --text: #e6edf3; --text-dim: #7a8896;
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .neon-text { color: var(--neon); text-shadow: 0 0 12px rgba(124,255,80,0.6); }
  .pulse-dot { position: relative; width: 10px; height: 10px; border-radius: 50%; background: var(--neon); box-shadow: 0 0 10px var(--neon); }
  .tab-active { color: var(--neon); border-bottom: 2px solid var(--neon); }
  .row-1 { color: var(--gold); }
  .row-2 { color: #c0c0c0; }
  .row-3 { color: #cd7f32; }
</style>
</head>
<body class="min-h-screen">

<header class="border-b border-[var(--line)] bg-[var(--bg-2)]/80 backdrop-blur">
  <div class="max-w-[900px] mx-auto px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="pulse-dot"></div>
      <a href="index.html" class="jellar-wordmark">JELLAR</a>
    </div>
    <a href="index.html" class="mono text-xs uppercase text-[var(--text-dim)] hover:neon-text">← back to pulse</a>
  </div>
</header>

<main class="max-w-[900px] mx-auto px-6 py-10">
  <div class="mono text-xs uppercase tracking-widest text-[var(--text-dim)]">Community</div>
  <h1 class="text-3xl md:text-4xl font-bold mt-1">Top Testers</h1>
  <p class="text-[var(--text-dim)] mt-2 text-sm">The humans providing the most signal. Click a name to see their live project.</p>

  <!-- TABS -->
  <div class="flex gap-4 mono text-xs uppercase mt-6 border-b border-[var(--line)]">
    <button data-range="week"  class="lb-tab tab-active pb-3 px-1">This Week</button>
    <button data-range="month" class="lb-tab pb-3 px-1 text-[var(--text-dim)]">This Month</button>
    <button data-range="all"   class="lb-tab pb-3 px-1 text-[var(--text-dim)]">All Time</button>
  </div>

  <div id="lb-wrap" class="mt-6">
    <div class="mono text-xs text-[var(--text-dim)]">Loading...</div>
  </div>
</main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient(
  'https://csfuhpljjfcrxpsvoqjx.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNzZnVocGxqamZjcnhwc3ZvcWp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjA3OTksImV4cCI6MjA5MTczNjc5OX0.WBkYhEi75xBqDWP8BWjzIQeqUgFHKt1JPCf-X-tAcAI'
);

let currentRange = 'week';

async function load(range) {
  currentRange = range;
  const wrap = document.getElementById('lb-wrap');
  wrap.innerHTML = '<div class="mono text-xs text-[var(--text-dim)]">Loading...</div>';

  let testerTotals = {};

  if (range === 'all') {
    // All-time: aggregate from feedback_sessions (source of truth)
    // We don't rely on karma_score on profiles as it may lag for older sessions
    const { data: sessions } = await supabase
      .from('feedback_sessions')
      .select('tester_id, credits_awarded');

    if (!sessions || sessions.length === 0) {
      wrap.innerHTML = '<div class="mono text-xs text-[var(--text-dim)]">No testers yet.</div>';
      return;
    }

    const totals = {};
    sessions.forEach(s => {
      totals[s.tester_id] = (totals[s.tester_id] || 0) + (s.credits_awarded || 0);
    });

    const sorted = Object.entries(totals)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 50);

    const ids = sorted.map(([id]) => id);
    const { data: profiles } = await supabase
      .from('profiles')
      .select('id, username, avatar_url')
      .in('id', ids);

    const profileMap = {};
    (profiles || []).forEach(p => { profileMap[p.id] = p; });

    const { data: projects } = await supabase
      .from('projects')
      .select('id, builder_id, title, sessions_count, review_cap')
      .in('builder_id', ids)
      .eq('status', 'live');

    const projectMap = {};
    (projects || []).forEach(p => {
      if ((p.sessions_count || 0) < (p.review_cap || 10)) {
        projectMap[p.builder_id] = p;
      }
    });

    renderTable(sorted.map(([id, score]) => ({
      id,
      username: profileMap[id]?.username || 'unknown',
      avatar_url: profileMap[id]?.avatar_url || null,
      score,
      project: projectMap[id] || null,
    })));

  } else {
    // Week / Month: aggregate from feedback_sessions
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - (range === 'week' ? 7 : 30));

    const { data: sessions } = await supabase
      .from('feedback_sessions')
      .select('tester_id, credits_awarded')
      .gte('completed_at', cutoff.toISOString());

    if (!sessions || sessions.length === 0) {
      wrap.innerHTML = `<div class="mono text-xs text-[var(--text-dim)]">No reviews this ${range} yet.</div>`;
      return;
    }

    sessions.forEach(s => {
      testerTotals[s.tester_id] = (testerTotals[s.tester_id] || 0) + (s.credits_awarded || 0);
    });

    const sorted = Object.entries(testerTotals)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 50);

    const ids = sorted.map(([id]) => id);
    const { data: profiles } = await supabase
      .from('profiles')
      .select('id, username, avatar_url')
      .in('id', ids);

    const profileMap = {};
    (profiles || []).forEach(p => { profileMap[p.id] = p; });

    const { data: projects } = await supabase
      .from('projects')
      .select('id, builder_id, title, sessions_count, review_cap')
      .in('builder_id', ids)
      .eq('status', 'live');

    const projectMap = {};
    (projects || []).forEach(p => {
      if ((p.sessions_count || 0) < (p.review_cap || 10)) {
        projectMap[p.builder_id] = p;
      }
    });

    renderTable(sorted.map(([id, score]) => ({
      id,
      username: profileMap[id]?.username || 'unknown',
      avatar_url: profileMap[id]?.avatar_url || null,
      score,
      project: projectMap[id] || null,
    })));
  }
}

function renderTable(rows) {
  const wrap = document.getElementById('lb-wrap');
  if (rows.length === 0) {
    wrap.innerHTML = '<div class="mono text-xs text-[var(--text-dim)]">No data yet.</div>';
    return;
  }

  const positionColor = i => i === 0 ? 'var(--gold)' : i === 1 ? '#c0c0c0' : i === 2 ? '#cd7f32' : 'var(--text-dim)';

  wrap.innerHTML = `
    <table class="w-full text-sm border-collapse">
      <thead>
        <tr class="border-b border-[var(--line)] mono text-xs uppercase text-[var(--text-dim)]">
          <th class="text-left py-2 pr-4 w-10">#</th>
          <th class="text-left py-2 pr-4">Tester</th>
          <th class="text-left py-2 pr-4 hidden md:table-cell">Their Project</th>
          <th class="text-right py-2">Credits</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map((r, i) => `
          <tr class="border-b border-[var(--line)] hover:bg-[var(--bg-2)] transition">
            <td class="py-3 pr-4 mono font-bold" style="color:${positionColor(i)}">${String(i+1).padStart(2,'0')}</td>
            <td class="py-3 pr-4">
              <div class="flex items-center gap-2">
                ${r.avatar_url ? `<img src="${esc(r.avatar_url)}" class="w-6 h-6 rounded-full border border-[var(--line)] shrink-0">` : ''}
                <span class="font-medium truncate">${esc(r.username)}</span>
              </div>
            </td>
            <td class="py-3 pr-4 hidden md:table-cell">
              ${r.project
                ? `<button class="project-link mono text-xs text-[var(--neon)] hover:underline truncate max-w-[200px] block text-left" data-project-id="${esc(r.project.id)}" data-project-title="${esc(r.project.title)}">
                    ${esc(r.project.title)} ▶
                  </button>`
                : `<span class="mono text-xs text-[var(--text-dim)]">No open project</span>`}
            </td>
            <td class="py-3 text-right mono font-bold neon-text">${r.score}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;

  // Project links — go to index and highlight
  wrap.querySelectorAll('.project-link').forEach(btn => {
    btn.addEventListener('click', () => {
      const pid = btn.dataset.projectId;
      window.location.href = `index.html?highlight=${encodeURIComponent(pid)}`;
    });
  });
}

// Tabs
document.querySelectorAll('.lb-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lb-tab').forEach(b => {
      b.classList.remove('tab-active'); b.classList.add('text-[var(--text-dim)]');
    });
    btn.classList.add('tab-active'); btn.classList.remove('text-[var(--text-dim)]');
    load(btn.dataset.range);
  });
});

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

load('week');
</script>
</body>
</html>
