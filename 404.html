<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jellar — Error</title>
<meta name="robots" content="noindex">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Space+Grotesk:wght@400;500;700&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#05070a;--bg-2:#0a0e14;--line:#1a2028;--neon:#7cff50;--hot:#ff3864;--text:#e6edf3;--text-dim:#7a8896;}
  .jellar-wordmark{font-family:"Cinzel",serif;font-weight:900;letter-spacing:.12em;color:#ffffff;text-shadow:0 0 8px rgba(255,255,255,.2);}
  html,body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;margin:0;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .neon-text{color:var(--neon);}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(124,255,80,.015) 0px,rgba(124,255,80,.015) 1px,transparent 1px,transparent 3px);z-index:0;}
  @keyframes glitch{0%,100%{transform:translate(0)}20%{transform:translate(-2px,1px)}40%{transform:translate(2px,-1px)}60%{transform:translate(-1px,2px)}80%{transform:translate(1px,-2px)}}
  .glitch{animation:glitch .3s ease infinite;}
  input[type="text"],textarea{background:var(--bg);border:1px solid var(--line);color:var(--text);padding:10px 12px;width:100%;font-family:inherit;font-size:14px;transition:border-color .15s;}
  input[type="text"]:focus,textarea:focus{outline:none;border-color:var(--neon);}
  .pulse-dot{width:10px;height:10px;border-radius:50%;background:var(--neon);box-shadow:0 0 10px var(--neon);display:inline-block;}
</style>
</head>
<body class="flex flex-col">

<header class="border-b border-[var(--line)] bg-[var(--bg-2)]/80 backdrop-blur">
  <div class="max-w-[1000px] mx-auto px-6 py-4 flex items-center gap-3">
    <div class="pulse-dot"></div>
    <a href="index.html" class="jellar-wordmark">JELLAR</a>
  </div>
</header>

<main class="flex-1 flex items-center justify-center px-6 py-20">
  <div class="max-w-[600px] w-full text-center">

    <!-- Error code -->
    <div class="mono font-bold glitch mb-4" style="font-size:96px;line-height:1;color:var(--hot);opacity:.15">404</div>
    <div class="mono text-xs uppercase tracking-widest mb-2" style="color:var(--hot)">Signal lost</div>
    <h1 class="text-3xl font-bold mt-2 mb-3">This page doesn't exist.</h1>
    <p class="text-[var(--text-dim)] mb-8">The URL might be wrong, the page may have moved, or something broke. If you think this is a bug, report it below.</p>

    <!-- Actions -->
    <div class="flex flex-wrap gap-3 justify-center mb-12">
      <button onclick="history.back()" class="mono font-bold px-6 py-3 border border-[var(--line)] text-[var(--text-dim)] hover:border-[var(--neon)] hover:neon-text transition text-sm">
        ← GO BACK
      </button>
      <a href="index.html" class="mono font-bold px-6 py-3 bg-[var(--neon)] text-black hover:shadow-[0_0_20px_rgba(124,255,80,.5)] transition text-sm">
        BACK TO PULSE →
      </a>
    </div>

    <!-- Report form -->
    <div class="border border-[var(--line)] bg-[var(--bg-2)] p-6 text-left">
      <div class="mono text-xs uppercase tracking-widest text-[var(--text-dim)] mb-4">Report this error</div>
      <div id="report-form">
        <div class="space-y-3">
          <div>
            <label class="mono text-xs uppercase text-[var(--text-dim)] block mb-1">What were you trying to do?</label>
            <input type="text" id="report-action" placeholder="e.g. clicking submit on the feedback form">
          </div>
          <div>
            <label class="mono text-xs uppercase text-[var(--text-dim)] block mb-1">Any other details? <span class="normal-case">(optional)</span></label>
            <textarea id="report-detail" rows="2" placeholder="Anything else that might help us track it down..."></textarea>
          </div>
          <button id="btn-report" class="mono font-bold text-xs px-5 py-2 border border-[var(--line)] hover:border-[var(--neon)] hover:neon-text transition">
            SUBMIT REPORT →
          </button>
        </div>
      </div>
      <div id="report-success" class="hidden mono text-xs neon-text">✓ Report sent. Thanks — we'll look into it.</div>
    </div>

  </div>
</main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient(
  'https://csfuhpljjfcrxpsvoqjx.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNzZnVocGxqamZjcnhwc3ZvcWp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNjA3OTksImV4cCI6MjA5MTczNjc5OX0.WBkYhEi75xBqDWP8BWjzIQeqUgFHKt1JPCf-X-tAcAI'
);

// Show the URL that caused the error
const badUrl = window.location.href;

document.getElementById('btn-report').addEventListener('click', async () => {
  const action = document.getElementById('report-action').value.trim();
  const detail = document.getElementById('report-detail').value.trim();
  const btn = document.getElementById('btn-report');

  btn.disabled = true; btn.textContent = 'SENDING...';

  // Store in newsletter_subscribers as a quick error log
  // In production, replace with a dedicated error_reports table
  try {
    const { data: { session } } = await supabase.auth.getSession();
    await supabase.from('newsletter_subscribers').insert({
      email: `error-report+${Date.now()}@jellar.internal`,
      source: 'error_report',
      profile_id: session?.user?.id || null,
    }).maybeSingle();
  } catch(e) {}

  // Log to console for now — replace with real error table after deploy
  console.log('Error report:', { url: badUrl, action, detail });

  document.getElementById('report-form').classList.add('hidden');
  document.getElementById('report-success').classList.remove('hidden');
});
</script>
</body>
</html>
